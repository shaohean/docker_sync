name: Docker Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"

jobs:
  sync:
    name: Sync Images
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: docker-sync
      cancel-in-progress: true
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Skopeo
      run: |
        sudo apt-get update
        sudo apt-get install -y skopeo

    - name: Login to Aliyun Registry
      run: |
        skopeo login ${{ secrets.ALIYUN_REGISTRY }} \
          --username ${{ secrets.ALIYUN_REGISTRY_USER }} \
          --password ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: Sync Images
      run: |
        set +e
        failed_images=()
        success_images=()

        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi

            echo "=========================================="
            echo "Processing: $line"
            echo "=========================================="

            # 解析镜像信息
            source_image=$(echo "$line" | awk '{print $NF}')

            # 处理 --platform 参数
            platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')

            # 判断是否为 docker.io 镜像，自动补全 registry 前缀
            if [[ "$source_image" != *"/"* ]]; then
                # 无命名空间的镜像，如 python:3.14
                source_image="docker.io/library/$source_image"
            elif [[ "$source_image" == "docker.io/"* ]]; then
                # 已有 docker.io 前缀，保持不变
                source_image="$source_image"
            elif [[ "$source_image" == "ghcr.io/"* ]]; then
                # 已有 docker.io 前缀，保持不变
                source_image="$source_image"
            else
                # 其他镜像，如 kasmweb/nginx:1.25.3
                source_image="docker.io/$source_image"
            fi

            # 获取镜像名:版本号
            image_name_tag=$(echo "$source_image" | awk -F'/' '{print $NF}')
            # 获取命名空间
            name_space=$(echo "$source_image" | awk -F'/' '{if (NF==4) print $3; else if (NF==3) print $2; else print "library"}')
            # 获取镜像名
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            # 构建 skopeo copy 参数
            copy_args="--retry-times 3"
            if [ -n "$platform" ]; then
                copy_args="$copy_args --override-arch $(echo $platform | cut -d'/' -f1)"
                platform_prefix="-${platform//\//_}"
            else
                platform_prefix=""
            fi

            # 目标镜像地址
            target_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$image_name_tag$platform_prefix"

            echo "Source: $source_image"
            echo "Target: $target_image"
            echo "Args: $copy_args"

            # 使用 skopeo 直接复制
            if skopeo copy $copy_args "docker://$source_image" "docker://$target_image"; then
                echo "::notice::Successfully synced: $line"
                success_images+=("$line")
            else
                echo "::warning::Failed to sync: $line"
                failed_images+=("$line")
            fi

        done < images.txt

        # 输出同步结果汇总
        echo ""
        echo "=========================================="
        echo "Sync Summary"
        echo "=========================================="
        echo "Success: ${#success_images[@]}"
        echo "Failed: ${#failed_images[@]}"

        if [ ${#success_images[@]} -gt 0 ]; then
            echo ""
            echo "Successfully synced images:"
            for img in "${success_images[@]}"; do
                echo "  ✓ $img"
            done
        fi

        if [ ${#failed_images[@]} -gt 0 ]; then
            echo ""
            echo "Failed images:"
            for img in "${failed_images[@]}"; do
                echo "  ✗ $img"
            done
            exit 1
        fi
