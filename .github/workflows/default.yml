name: Docker Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"

jobs:
  sync:
    name: Sync Images
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: docker-sync
      cancel-in-progress: true
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Skopeo
      run: |
        sudo apt-get update
        sudo apt-get install -y skopeo jq

    - name: Login to Aliyun Registry
      run: |
        skopeo login ${{ secrets.ALIYUN_REGISTRY }} \
          --username ${{ secrets.ALIYUN_REGISTRY_USER }} \
          --password ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: Sync Images
      run: |
        set +e
        failed_images=()
        success_images=()

        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if [[ "$line" =~ ^[[:space:]]*# ]]; then
                continue
            fi

            echo "=========================================="
            echo "Processing: $line"
            echo "=========================================="

            # 解析镜像信息
            source_image="${line##* }"

            # 处理 --platform 参数
            if [[ "$line" =~ --platform[[:space:]=]([^[:space:]]+) ]]; then
                platform="${BASH_REMATCH[1]}"
            else
                platform=""
            fi

            # 判断镜像来源，自动补全 registry 前缀
            registry_part="${source_image%%/*}"
            if [[ "$source_image" != *"/"* ]]; then
                # 无命名空间的镜像，如 alpine:3.19
                source_image="docker.io/library/$source_image"
            elif [[ "$registry_part" == *"."* ]] || [[ "$registry_part" == *":"* ]]; then
                # 第一个 / 前包含 . 或 :，说明是 registry 域名（如 registry.k8s.io、ghcr.io:5000），保持不变
                :
            else
                # Docker Hub 带命名空间的镜像，如 kasmweb/nginx:1.25.3
                source_image="docker.io/$source_image"
            fi
            skopeo list-tags docker://${source_image}
            # 获取镜像名:版本号
            image_name_tag="${source_image##*/}"

            # 构建 skopeo copy 参数
            copy_args="--retry-times 3"
            if [ -n "$platform" ]; then
                copy_args="$copy_args --override-arch ${platform%%/*}"
                platform_prefix="-${platform//\//_}"
            else
                platform_prefix=""
            fi

            # 目标镜像地址
            target_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$image_name_tag$platform_prefix"

            echo "Source: $source_image"
            echo "Target: $target_image"
            echo "Args: $copy_args"

            # 使用 skopeo 直接复制
            if skopeo copy $copy_args "docker://$source_image" "docker://$target_image"; then
                echo "::notice::Successfully synced: $line"
                success_images+=("$line")
            else
                echo "::warning::Failed to sync: $line"
                failed_images+=("$line")
            fi

        done < images.txt

        # 输出同步结果汇总
        echo ""
        echo "=========================================="
        echo "Sync Summary"
        echo "=========================================="
        echo "Success: ${#success_images[@]}"
        echo "Failed: ${#failed_images[@]}"

        if [ ${#success_images[@]} -gt 0 ]; then
            echo ""
            echo "Successfully synced images:"
            for img in "${success_images[@]}"; do
                echo "  ✓ $img"
            done
        fi

        if [ ${#failed_images[@]} -gt 0 ]; then
            echo ""
            echo "Failed images:"
            for img in "${failed_images[@]}"; do
                echo "  ✗ $img"
            done
            exit 1
        fi
